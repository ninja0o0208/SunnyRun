const latlngs = points.map(p => [p.lat, p.lon]);

const map = L.map('map', { zoomControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 20
}).addTo(map);

const full = L.polyline(latlngs, { color: '#9a9a9a', weight: 5, opacity: 0.8 }).addTo(map);
const done = L.polyline([], { color: '#202428', weight: 6, opacity: 0.95 }).addTo(map);

latlngs.forEach(ll => L.circleMarker(ll, {
  radius: 5, color: '#fff', weight: 1.5, fillColor: '#009b55', fillOpacity: 1
}).addTo(map));

const truckIcon = L.divIcon({ className: 'truck-icon', html: '🚛', iconSize: [32, 32] });
const truck = L.marker(latlngs[0], { icon: truckIcon }).addTo(map);

map.fitBounds(full.getBounds().pad(0.18));

let idx = 0;
let playing = true;
let timer = null;

function showTime(p) {
  const raw = p.time || '';
  const parts = raw.split(' ');
  document.getElementById('timeText').textContent = parts.length > 1 ? parts[1] : raw;
  document.getElementById('dateText').textContent = parts.length > 1 ? parts[0] : '';
}

function setIndex(i) {
  idx = Math.max(0, Math.min(points.length - 1, Math.round(i)));
  truck.setLatLng(latlngs[idx]);
  done.setLatLngs(latlngs.slice(0, idx + 1));
  showTime(points[idx]);
  document.getElementById('slider').value = Math.round(idx / (points.length - 1) * 1000);
  document.getElementById('progressText').textContent = `${idx + 1} / ${points.length}`;
}

function step() {
  if (!playing) return;
  const spd = parseFloat(document.getElementById('speed').value);
  setIndex(idx + Math.max(1, Math.round(spd)));
  if (idx >= points.length - 1) playing = false;
}

function startTimer() {
  if (timer) clearInterval(timer);
  timer = setInterval(step, 180);
}

document.getElementById('playBtn').onclick = () => { playing = !playing; };
document.getElementById('resetBtn').onclick = () => { playing = false; setIndex(0); };
document.getElementById('slider').oninput = e => {
  playing = false;
  setIndex(parseInt(e.target.value, 10) / 1000 * (points.length - 1));
};

setIndex(0);
startTimer();

window.__routeFrameCount = points.length;
window.__setRouteFrame = function(i) { setIndex(i); };
</script>
