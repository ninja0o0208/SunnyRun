  const metaParts = [s.city, s.village].filter(Boolean);
  const popupHtml = `
    <div class="stop-popup">
      <div class="sp-title">停靠點 ${label}｜${title}</div>
      <div class="sp-meta">${metaParts.join('｜')}</div>
      <div class="sp-row"><strong>地址：</strong>${s.name || '未提供'}</div>
      <div class="sp-row"><strong>官方預定到站：</strong>${s.time || '未提供'}</div>
      ${s.memo ? `<div class="sp-row"><strong>備註：</strong>${s.memo}</div>` : ''}
      <div class="sp-actions">
        <a class="sp-btn" href="${navUrl}" target="_blank" rel="noopener noreferrer">Google 導航</a>
        <a class="sp-btn" href="${searchUrl}" target="_blank" rel="noopener noreferrer">查看位置</a>
      </div>
    </div>`;
  L.marker([s.lat, s.lon], { icon: createStopIcon(label), zIndexOffset: 500 }).addTo(officialStopLayer).bindPopup(popupHtml);
});

const truckIcon = L.divIcon({ className: 'truck-icon', html: '🚚', iconSize: [30, 30], iconAnchor: [15, 20] });
const truckMarker = L.marker(routeLatLngs[0], { icon: truckIcon, zIndexOffset: 1000 }).addTo(map);
L.control.layers(null, { '官方停靠點': officialStopLayer, 'GPS 原始點': dotLayer }, { collapsed: true, position: 'bottomright' }).addTo(map);

const timeText = document.getElementById('timeText');
const locationText = document.getElementById('locationText');
const frameText = document.getElementById('frameText');
const slider = document.getElementById('slider');
const playBtn = document.getElementById('playBtn');
const speedSelect = document.getElementById('speedSelect');

let currentFrame = 0;
let timer = null;
let baseFps = routeMeta.previewFps || 12;
let speedMultiplier = 1;

function clampFrame(i) {
  return Math.max(0, Math.min(frames.length - 1, i));
}

function traveledLatLngsForFrame(frame) {
  const seg = Math.max(0, Math.min(routePoints.length - 2, frame.segmentIndex || 0));
  const arr = [];
  for (let i = 0; i <= seg; i++) arr.push([routePoints[i].lat, routePoints[i].lon]);
  arr.push([frame.lat, frame.lon]);
  return arr;
}

function renderFrame(i) {
  currentFrame = clampFrame(i);
  const f = frames[currentFrame];
  const latlng = [f.lat, f.lon];
  truckMarker.setLatLng(latlng);
  traveledRoute.setLatLngs(traveledLatLngsForFrame(f));
  timeText.textContent = f.time || ('Frame ' + (currentFrame + 1));
  locationText.textContent = f.location || '';
  slider.value = String(currentFrame);
  frameText.textContent = (currentFrame + 1) + ' / ' + frames.length;
  return true;
}

function playIntervalMs() {
  return 1000 / Math.max(1, baseFps * speedMultiplier);
}

function play() {
  if (timer) return;
  playBtn.textContent = '暫停';
  timer = setInterval(() => {
    if (currentFrame >= frames.length - 1) {
      renderFrame(0);
      return;
    }
    renderFrame(currentFrame + 1);
  }, playIntervalMs());
}

function pause() {
  if (timer) clearInterval(timer);
  timer = null;
  playBtn.textContent = '播放';
}

playBtn.addEventListener('click', () => { timer ? pause() : play(); });
slider.addEventListener('input', () => { pause(); renderFrame(Number(slider.value)); });
speedSelect.addEventListener('change', () => {
  const wasPlaying = Boolean(timer);
  speedMultiplier = Number(speedSelect.value) || 1;
  if (wasPlaying) {
    pause();
    play();
  }
});

renderFrame(0);
window.routeAnimator = {
  renderFrame,
  pause,
  play,
  get frameCount() { return frames.length; },
  freezeMap: function() {
    pause();
    map.dragging.disable();
    map.touchZoom.disable();
    map.doubleClickZoom.disable();
    map.scrollWheelZoom.disable();
    map.boxZoom.disable();
    map.keyboard.disable();
    if (map.zoomControl) map.zoomControl.remove();
  }
};
window.routeAnimatorReady = true;
</script>
</body>
</html>
