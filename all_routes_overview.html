function isMobileViewport() {
  return window.matchMedia('(max-width: 760px)').matches;
}

function hideMobilePanels() {
  if (!isMobileViewport()) return;
  topPanel.classList.add('panel-hidden');
  sidePanel.classList.add('panel-hidden');
}

function showMobilePanel(panelName) {
  if (!isMobileViewport()) return;
  if (panelName === 'routes') {
    topPanel.classList.add('panel-hidden');
    sidePanel.classList.remove('panel-hidden');
    setTimeout(() => filterInput.focus({ preventScroll: true }), 80);
  } else if (panelName === 'info') {
    sidePanel.classList.add('panel-hidden');
    topPanel.classList.remove('panel-hidden');
    window.clearTimeout(showMobilePanel.infoTimer);
    showMobilePanel.infoTimer = window.setTimeout(() => {
      if (isMobileViewport()) topPanel.classList.add('panel-hidden');
    }, 4500);
  }
}

function updateMobileBadge() {
  if (!mobileBadge) return;
  const n = activeIds.size;
  mobileBadge.textContent = n ? `已選 ${n} / ${routes.length}` : `未選路線`;
}

function fmtTime(sec) {
  if (!Number.isFinite(sec)) return '--';
  const d = new Date(sec * 1000);
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const ss = String(d.getSeconds()).padStart(2, '0');
  return `${hh}:${mm}:${ss}`;
}

function fmtDuration(sec) {
  if (!Number.isFinite(sec) || sec < 0) return 'N/A';
  sec = Math.round(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h) return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function createStopIcon(label, color) {
  return L.divIcon({
    className: 'stop-pin-wrap',
    html: `<div class="stop-pin" style="background:${color}"><span>${label}</span></div>`,
    iconSize: [25, 36], iconAnchor: [13, 31], popupAnchor: [0, -26]
  });
}

function createLayers(route) {
  if (layers.has(route.id)) return layers.get(route.id);
  const latlngs = route.points.map(p => [p.lat, p.lon]);
  const group = L.layerGroup();
  const full = L.polyline(latlngs, { color: route.color, weight: 4, opacity: .44, lineCap: 'round', lineJoin: 'round' });
  const traveled = L.polyline([], { color: route.color, weight: 7, opacity: .94, lineCap: 'round', lineJoin: 'round' });
  const truckIcon = L.divIcon({ className: 'truck-icon', html: '🚚', iconSize: [28, 28], iconAnchor: [14, 20] });
  const marker = L.marker(latlngs[0], { icon: truckIcon, zIndexOffset: 1000 });
  full.addTo(group);
  traveled.addTo(group);
  marker.addTo(group);
  const stopGroup = L.layerGroup().addTo(group);
  route.stops.forEach((s, idx) => {
    const label = String(s.rank || (idx + 1));
    const title = s.name || `停靠點 ${label}`;
    const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}&travelmode=driving`;
    const searchUrl = `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lon}`;
    const metaParts = [s.city, s.village].filter(Boolean).join('｜');
    const popupHtml = `<div class="stop-popup">
      <div class="sp-title">${route.label}<br>停靠點 ${label}｜${title}</div>
      <div class="sp-row"><strong>區里：</strong>${metaParts || '未提供'}</div>
      <div class="sp-row"><strong>地址：</strong>${s.name || '未提供'}</div>
      <div class="sp-row"><strong>官方預定到站：</strong>${s.time || '未提供'}</div>
      ${s.memo ? `<div class="sp-row"><strong>備註：</strong>${s.memo}</div>` : ''}
      <a class="sp-btn" href="${navUrl}" target="_blank" rel="noopener noreferrer">Google 導航</a>
      <a class="sp-btn" href="${searchUrl}" target="_blank" rel="noopener noreferrer">查看位置</a>
    </div>`;
    L.marker([s.lat, s.lon], { icon: createStopIcon(label, route.color), zIndexOffset: 500 }).bindPopup(popupHtml).addTo(stopGroup);
  });
  const obj = { group, full, traveled, marker, stopGroup, latlngs };
  layers.set(route.id, obj);
  return obj;
}

function checkboxFor(route) {
  return document.querySelector(`input.route-check[data-id="${CSS.escape(route.id)}"]`);
}

      </span>
    </label>`;
    routeListEl.appendChild(item);
  });
  routeListEl.querySelectorAll('.route-check').forEach(cb => {
    cb.addEventListener('change', (e) => {
      setRouteActive(e.target.dataset.id, e.target.checked);
    });
  });
}

function setRouteActive(id, active) {
  const route = routeById.get(id);
  if (!route) return;
  const layer = createLayers(route);
  if (active) {
    activeIds.add(id);
    if (!map.hasLayer(layer.group)) layer.group.addTo(map);
  } else {
    activeIds.delete(id);
    if (map.hasLayer(layer.group)) map.removeLayer(layer.group);
  }
  const cb = checkboxFor(route);
  if (cb) cb.checked = active;
  recomputeTimeline(true);
}

function visibleFilteredIds() {
  const ids = [];
  document.querySelectorAll('.route-item:not(.hidden) .route-check').forEach(cb => ids.push(cb.dataset.id));
  return ids;
}

function setMany(ids, active) {
  ids.forEach(id => {
    const route = routeById.get(id);
    if (!route) return;
    const layer = createLayers(route);
    if (active) {
      activeIds.add(id);
      if (!map.hasLayer(layer.group)) layer.group.addTo(map);
    } else {
      activeIds.delete(id);
      if (map.hasLayer(layer.group)) map.removeLayer(layer.group);
    }
  });
  renderList();
  recomputeTimeline(true);
}

function recomputeTimeline(preserveRatio) {
  const activeRoutes = routes.filter(r => activeIds.has(r.id));
  if (!activeRoutes.length) {
    timeline = null;
    currentT = null;
    slider.value = 0;
    timeText.textContent = '--';
    statusText.textContent = '尚未選擇路線';
    updateMobileBadge();
    pause();
    return;
  }
  const old = timeline;
  let ratio = Number(slider.value) / sliderMax;
  if (preserveRatio && old && currentT !== null && old.end > old.start) {
    ratio = (currentT - old.start) / (old.end - old.start);
  }
  const start = Math.min(...activeRoutes.map(r => r.startT));
  const end = Math.max(...activeRoutes.map(r => r.endT));
  timeline = { start, end };
  ratio = Math.max(0, Math.min(1, ratio));
  currentT = start + (end - start) * ratio;
  slider.value = String(Math.round(ratio * sliderMax));
  updateFrame();
}

function interpolateRoute(route, t) {
  const pts = route.points;
  if (t <= pts[0].t) return { lat: pts[0].lat, lon: pts[0].lon, index: 0, active: false, done: false };
  const last = pts[pts.length - 1];
  if (t >= last.t) return { lat: last.lat, lon: last.lon, index: pts.length - 1, active: false, done: true };
  let lo = 0, hi = pts.length - 1;
  while (lo < hi) {
    const mid = Math.floor((lo + hi) / 2);
    if (pts[mid].t < t) lo = mid + 1; else hi = mid;
  }
  const i = Math.max(1, lo);
  const a = pts[i - 1], b = pts[i];
  const ratio = b.t === a.t ? 0 : (t - a.t) / (b.t - a.t);
  return { lat: a.lat + (b.lat - a.lat) * ratio, lon: a.lon + (b.lon - a.lon) * ratio, index: i - 1, active: true, done: false };
}

function traveledLatLngs(route, interp) {
  const pts = route.points;
  if (interp.done) return pts.map(p => [p.lat, p.lon]);
  if (!interp.active && interp.index === 0) return [];
  const arr = [];
  for (let i = 0; i <= interp.index; i++) arr.push([pts[i].lat, pts[i].lon]);
  arr.push([interp.lat, interp.lon]);
  return arr;
}

function updateFrame() {
  if (!timeline || currentT === null) return;
  const selectedRoutes = routes.filter(r => activeIds.has(r.id));
  selectedRoutes.forEach(route => {
    const layer = createLayers(route);
    const interp = interpolateRoute(route, currentT);
    layer.marker.setLatLng([interp.lat, interp.lon]);
    layer.traveled.setLatLngs(traveledLatLngs(route, interp));
    layer.marker.setOpacity((currentT < route.startT || currentT > route.endT) ? .45 : 1);
  });
  const dur = timeline.end - timeline.start;
  const ratio = dur > 0 ? (currentT - timeline.start) / dur : 0;
  slider.value = String(Math.round(Math.max(0, Math.min(1, ratio)) * sliderMax));
  const totalKm = selectedRoutes.reduce((sum, r) => sum + r.distanceKm, 0);
  const stopCount = selectedRoutes.reduce((sum, r) => sum + r.stopCount, 0);
  timeText.textContent = `${fmtTime(currentT)}｜${fmtDuration(currentT - timeline.start)} / ${fmtDuration(dur)}`;
  statusText.textContent = `已選 ${selectedRoutes.length} / ${routes.length} 條｜時間 ${fmtTime(timeline.start)} → ${fmtTime(timeline.end)}｜展示長度 ${fmtDuration(dur)}｜總里程 ${totalKm.toFixed(1)} km｜停靠點 ${stopCount}`;
  updateMobileBadge();
}

function stepSeconds() {
  if (!timeline) return 1;
  const dur = Math.max(1, timeline.end - timeline.start);
  return Math.max(1, dur / 700) * speedMultiplier;
}

function play() {
  if (timer || !timeline) return;
  playBtn.textContent = '暫停';
  timer = setInterval(() => {
    if (!timeline || currentT === null) return;
    currentT += stepSeconds();
    if (currentT > timeline.end) currentT = timeline.start;
    updateFrame();
  }, 50);
}

function pause() {
  if (timer) clearInterval(timer);
  timer = null;
  playBtn.textContent = '播放';
}

function fitActiveBounds() {
  const latlngs = [];
  routes.filter(r => activeIds.has(r.id)).forEach(r => {
    r.points.forEach(p => latlngs.push([p.lat, p.lon]));
    r.stops.forEach(s => latlngs.push([s.lat, s.lon]));
  });
  if (!latlngs.length) return;
  const b = L.latLngBounds(latlngs);
  map.fitBounds(b, { padding: window.innerWidth <= 760 ? [24, 24] : [70, 70] });
}

function applyUrlParams() {
  const params = new URLSearchParams(location.search);
  const all = (params.get('all') || params.get('show') || '').toLowerCase();
  const selected = new Set();
  if (all === '1' || all === 'true' || all === 'on' || all === 'all') {
    routes.forEach(r => selected.add(r.id));
  }
  if (all === '0' || all === 'false' || all === 'off' || all === 'none') {
    selected.clear();
  }
  const routeParam = params.get('routes') || params.get('lineids') || params.get('lineid');
  if (routeParam) {
    selected.clear();
    routeParam.split(',').map(s => s.trim()).filter(Boolean).forEach(token => {
      if (routeById.has(token)) selected.add(token);
      if (routeByLineid.has(token)) routeByLineid.get(token).forEach(r => selected.add(r.id));
    });
  }
  if (selected.size) setMany([...selected], true);
  else recomputeTimeline(false);
}

filterInput.addEventListener('input', renderList);
document.getElementById('showFilteredBtn').addEventListener('click', () => { setMany(visibleFilteredIds(), true); if (isMobileViewport()) hideMobilePanels(); });
document.getElementById('allOnBtn').addEventListener('click', () => { setMany(routes.map(r => r.id), true); if (isMobileViewport()) hideMobilePanels(); });
document.getElementById('allOffBtn').addEventListener('click', () => { setMany(routes.map(r => r.id), false); if (isMobileViewport()) hideMobilePanels(); });
document.getElementById('fitBtn').addEventListener('click', () => { fitActiveBounds(); if (isMobileViewport()) hideMobilePanels(); });
mobileRoutesBtn.addEventListener('click', () => showMobilePanel('routes'));
mobileInfoBtn.addEventListener('click', () => showMobilePanel('info'));
closeTopBtn.addEventListener('click', hideMobilePanels);
closeSideBtn.addEventListener('click', hideMobilePanels);
window.addEventListener('resize', () => {
  if (isMobileViewport()) {
    hideMobilePanels();
  } else {
    topPanel.classList.remove('panel-hidden');
    sidePanel.classList.remove('panel-hidden');
  }
});
playBtn.addEventListener('click', () => timer ? pause() : play());
speedSelect.addEventListener('change', () => { speedMultiplier = Number(speedSelect.value) || 1; });
slider.addEventListener('input', () => {
  if (!timeline) return;
  pause();
  const ratio = Number(slider.value) / sliderMax;
  currentT = timeline.start + (timeline.end - timeline.start) * ratio;
  updateFrame();
});

renderList();
applyUrlParams();
updateMobileBadge();
if (isMobileViewport()) hideMobilePanels();
if (routes.length) {
  const allLatLngs = [];
  routes.forEach(r => r.points.forEach(p => allLatLngs.push([p.lat, p.lon])));
  if (allLatLngs.length) map.fitBounds(L.latLngBounds(allLatLngs), { padding: [70, 70] });
}
</script>
</body>
